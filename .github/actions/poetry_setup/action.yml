# An action for setting up poetry install with caching.
# Using a custom action since the default action does not
# take poetry install groups into account.
# Action code from:
# https://github.com/actions/setup-python/issues/505#issuecomment-1273013236
name: poetry-install-with-caching
description: Poetry install with support for caching of dependency groups.

inputs:
  python-version:
    description: Python version, supporting MAJOR.MINOR only
    required: true

  poetry-version:
    description: Poetry version
    required: true

  cache-key:
    description: Cache key to use for manual handling of caching
    required: true

  working-directory:
    description: Directory whose poetry.lock file should be cached
    required: true

runs:
  using: composite
  steps:
    - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
      name: Setup python ${{ inputs.python-version }}
      id: setup-python
      with:
        python-version: ${{ inputs.python-version }}

    - name: Configure Poetry environment
      shell: bash
      # Make poetry create project virtualenvs using whatever Python is active
      # on PATH (i.e. the matrix Python set up by actions/setup-python above).
      # This decouples the Python that runs the poetry CLI from the Python used
      # for the project venv, which lets us keep poetry on a single, fixed
      # interpreter even when matrix.python-version is older.
      run: echo "POETRY_VIRTUALENVS_PREFER_ACTIVE_PYTHON=true" >> "$GITHUB_ENV"

    - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      id: cache-bin-poetry
      name: Cache Poetry binary - Python ${{ inputs.python-version }}
      env:
        SEGMENT_DOWNLOAD_TIMEOUT_MIN: "1"
      with:
        path: |
          /opt/pipx/venvs/poetry
        # Poetry now runs under the system python3, not the matrix Python,
        # so the cache no longer depends on inputs.python-version. The -v2
        # suffix busts the previous (matrix-Python-bound) cache.
        key: bin-poetry-${{ runner.os }}-${{ runner.arch }}-${{ inputs.poetry-version }}-v2

    - name: Refresh shell hashtable and fixup softlinks
      if: steps.cache-bin-poetry.outputs.cache-hit == 'true'
      shell: bash
      env:
        POETRY_VERSION: ${{ inputs.poetry-version }}
      run: |
        set -eux

        # Refresh the shell hashtable, to ensure correct `which` output.
        hash -r

        # `actions/cache@v3` doesn't always seem able to correctly unpack softlinks.
        # Delete and recreate the softlinks pipx expects to have.
        rm /opt/pipx/venvs/poetry/bin/python
        cd /opt/pipx/venvs/poetry/bin
        ln -s "/usr/bin/python3" python
        # Do not chmod the symlink: chmod follows it and tries to modify
        # /usr/bin/python3 (root-owned), which fails. The target is already +x.
        cd /opt/pipx_bin/
        ln -s /opt/pipx/venvs/poetry/bin/poetry poetry
        chmod +x poetry

        # Ensure everything got set up correctly.
        /opt/pipx/venvs/poetry/bin/python --version
        /opt/pipx_bin/poetry --version

    - name: Install poetry
      if: steps.cache-bin-poetry.outputs.cache-hit != 'true'
      shell: bash
      env:
        POETRY_VERSION: ${{ inputs.poetry-version }}
      # Install poetry under the runner's system Python (typically 3.12 on
      # ubuntu-24.04). Using the matrix Python (e.g. 3.9) breaks here because
      # one of poetry's transitive deps now uses dataclass(slots=...), which is
      # Python 3.10+ only. Poetry itself doesn't need to share the project's
      # interpreter; POETRY_VIRTUALENVS_PREFER_ACTIVE_PYTHON ensures the
      # project venv is still built with the matrix Python.
      run: pipx install "poetry==$POETRY_VERSION" --python "/usr/bin/python3" --verbose

    - name: Restore pip and poetry cached dependencies
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      env:
        SEGMENT_DOWNLOAD_TIMEOUT_MIN: "4"
        WORKDIR: ${{ inputs.working-directory == '' && '.' || inputs.working-directory }}
      with:
        path: |
          ~/.cache/pip
          ~/.cache/pypoetry/virtualenvs
          ~/.cache/pypoetry/cache
          ~/.cache/pypoetry/artifacts
          ${{ env.WORKDIR }}/.venv
        key: py-deps-${{ runner.os }}-${{ runner.arch }}-py-${{ inputs.python-version }}-poetry-${{ inputs.poetry-version }}-${{ inputs.cache-key }}-${{ hashFiles(format('{0}/**/poetry.lock', env.WORKDIR)) }}

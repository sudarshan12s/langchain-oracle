[pytest]
env_files = .env
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts = 
    --tb=short
    -v
    --strict-markers
    --cov=langgraph_oracledb
    --cov-report=term
markers =
    oracle: marks tests that require Oracle database connection
